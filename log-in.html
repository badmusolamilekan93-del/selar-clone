<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Log in - Selar</title>
    <link rel="stylesheet" href="log-in.css" />
    <link rel="shortcut icon" href="https://play-lh.googleusercontent.com/Lr38c4PU0hxWPC8-t7Y7qVJ0ljjCC-cPBnRwOQwUh_NEPW1eD8ji6JFOe0UKc6JakXrFz18uCIlJivPC-FvNrVs=w240-h480-rw" type="image/x-icon">
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

  </head>
  <body>
    <nav id="navbar">
      <div id="navlogo">
        <a href="index.html"
          ><img src="images/download.png" alt="Selar logo"
        /></a>
      </div>
      <ul id="navlinks">
        <li><a href="">How it Works</a></li>
        <li><a href="">Pricing</a></li>
        <li><a href="">Features</a></li>
        <li><a href="">Learn</a></li>
        <li><a href="">Affiliate Network</a></li>
        <li><a href="">EN</a></li>
        <li><a href="log-in.html">Log In</a></li>
        <li><a href="sign-up.html " id="start">Start Selling</a></li>
      </ul>
    </nav>

    <form action="" id="login">
      <div id="text">
        <h1>Log in to Selar</h1>
        <p>
          Don't have an account? <a href="sign-up.html">Create one for free.</a>
        </p>
      </div>

      <div class="body">
        <label for="user">Username or Email</label>
        <input type="text" id="user" placeholder="Username or Email address" />
      </div>

      <div class="body">
        <label for="password">Password</label>
        <input type="password" id="password" />
      </div>

      <p id="Forgot"><a href="">Forgot your password?</a></p>

      <button type="submit" id="reg">Log in</button>

      <p id="divider">or continue with</p>

      <div class="others">
        <img src="images/download.jfif" alt="Google" />
        <p>Login with Google</p>
      </div>
      <div class="others">
        <img src="images/download (1).png" alt="X" />
        <p>Login with X (or Twitter)</p>
      </div>
      <div class="others">
        <img src="images/download (2).png" alt="Facebook" />
        <p>Login with Facebook</p>
      </div>
    </form>
    <!-- Left illustration -->
    <div id="illustration">
      <img src="images/HandsPhone.png" alt="" />
    </div>

    <!-- Bottom right chat icon -->
    <div id="chat-icon">
      <i class="fa-regular fa-comment-dots"></i>
    </div>
  </body>
</html>
